<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mings' Bio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial,sans-serif;

    cursor:pointer;
}

/* Video nền */
.bg-video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
}

/* Nội dung */
.content{
    text-align:center;
    color:white;

    animation:slideDown 2s ease;
}

/* Avatar */
.avatar{
    width:170px;
    height:170px;

    border-radius:50%;
    object-fit:cover;

    border:4px solid white;

    box-shadow:0 0 25px rgba(0,0,0,.5);

    transition:.3s;
}

.avatar:hover{
    transform:scale(1.08);
}

h1{
    margin-top:20px;
    margin-bottom:10px;
    font-size:46px;

    text-shadow:0 0 15px black;
}

p{
    font-size:20px;
    line-height:1.8;

    text-shadow:0 0 15px black;
}

/* Thông báo */
#hint{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);

    color:white;
    font-size:18px;

    background:rgba(0,0,0,.45);
    padding:12px 22px;

    border-radius:30px;

    animation:pulse 1.6s infinite;
}

@keyframes pulse{
    0%,100%{
        opacity:1;
    }

    50%{
        opacity:.4;
    }
}

/* Hiệu ứng xuất hiện */
@keyframes slideDown{
    0%{
        opacity:0;
        transform:translateY(-400px);
    }

    100%{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<video id="bgVideo" class="bg-video" autoplay muted loop playsinline>
    <source src="https://res.cloudinary.com/vkrhbvp8/video/upload/v1783935887/Gimme_more____MORE_MORE_JUMP___%E5%88%9D%E9%9F%B3%E3%83%9F%E3%82%AF_1080p_yplfma.mp4" type="video/mp4">
</video>

<div class="content">

    <img src="mikumino7.png" class="avatar">

    <h1>Mings</h1>

    <p>
        Mina-san Konichiwa! ✨
        <br>
        Đây là bio của mình.
        <br>
        Mình sẽ update sau.
    </p>

</div>

<div id="hint">
    👆 Nhấp vào bất kỳ đâu để bật nhạc
</div>

<script>

const video = document.getElementById("bgVideo");
const hint = document.getElementById("hint");

document.addEventListener("click", async ()=>{

    if(video.muted){

        video.muted = false;

        try{
            await video.play();
        }catch(e){
            console.log(e);
        }

        hint.style.display="none";
    }

},{once:true});

</script>

</body>
</html>
