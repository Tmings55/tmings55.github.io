<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mings' Bio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;

    /* Ảnh nền từ GitHub */
    background-image:url("miku.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial, sans-serif;
}

/* Lớp phủ tối giúp dễ đọc chữ */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
}

.card{
    position:relative;
    z-index:1;

    width:500px;
    max-width:90%;

    padding:30px;

    text-align:center;

    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);

    border-radius:20px;

    color:white;
}

.avatar{
    width:150px;
    height:150px;

    border-radius:50%;
    object-fit:cover;

    border:4px solid white;
}

h1{
    margin-top:15px;
    margin-bottom:10px;
    font-size:40px;
}

p{
    line-height:1.8;
    font-size:18px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">

    <img src="miku.png" class="avatar" alt="Avatar">

    <h1>QM</h1>

    <p>
        Mina-san Konichiwa!
        <br>
        Đây là bio của mình nhóoo.
        <br>
        Mình sẽ update sau nhóoo.
    </p>

</div>

</body>
</html>
