<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mings' Bio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial, sans-serif;
}

/* Video nền */
.bg-video{
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
}

.overlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 1;
}

.card{
    position: relative;
    z-index: 2;
}

/* Lớp phủ tối */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    z-index:-1;
}

/* Khung chính */
.card{
    position:relative;
    z-index:1;

    width:500px;
    max-width:90%;

    padding:30px;
    text-align:center;

    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);

    border-radius:20px;

    color:white;

    animation:slideDown 3s ease;
}

/* Avatar */
.avatar{
    width:150px;
    height:150px;

    border-radius:50%;
    object-fit:cover;

    border:4px solid white;

    transition:0.3s;
}

.avatar:hover{
    transform:scale(1.08);
}

h1{
    margin-top:15px;
    margin-bottom:10px;
    font-size:40px;
}

p{
    line-height:1.8;
    font-size:18px;
}

/* Hiệu ứng xuất hiện */
@keyframes slideDown{
    0%{
        opacity:0;
        transform:translateY(-500px);
    }

    70%{
        transform:translateY(20px);
    }

    100%{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<!-- Video nền -->
<video class="bg-video" controls loop>
    <source src="https://res.cloudinary.com/vkrhbvp8/video/upload/v1783935887/Gimme_more____MORE_MORE_JUMP___%E5%88%9D%E9%9F%B3%E3%83%9F%E3%82%AF_1080p_yplfma.mp4" type="video/mp4">
    Trình duyệt của bạn không hỗ trợ video.
</video>

<div class="overlay"></div>

<div class="card">

    <img src="mikumino7.png" class="avatar" alt="Avatar">

    <h1>Mings</h1>

    <p>
        Mina-san Konichiwa! ✨
        <br>
        Đây là bio của mình.
        <br>
        Mình sẽ update sau nhé.
    </p>

</div>

</body>
</html>
