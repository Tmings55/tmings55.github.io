<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Website của tôi</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;

    background-image:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial,sans-serif;
}

.box{
    background:rgba(0,0,0,0.6);
    color:white;

    width:450px;
    padding:30px;

    border-radius:20px;
    text-align:center;

    backdrop-filter:blur(5px);
}

h1{
    margin-bottom:15px;
    font-size:45px;
}

p{
    font-size:20px;
}
</style>

</head>

<body>

<div class="box">
    <h1>Xin chào!</h1>
    <p>Tôi là qm.</p>
    <br>
    <p>Chào mừng đến với website cá nhân của tôi.</p>
</div>

</body>
</html>
